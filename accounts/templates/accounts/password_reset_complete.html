{% extends "base.html" %}
{% block title %}Password Reset Complete — Campus Health{% endblock %}

{% block public_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center p-4"
     style="background:#f4f6f9;">
  <div style="width:100%;max-width:420px;">

    <div class="card border-0 shadow-sm text-center">
      <div class="card-body p-5">
        <i class="bi bi-check-circle-fill mb-3 d-block"
           style="font-size:2.5rem;color:#0f6e56;"></i>
        <h5 class="fw-bold mb-2">Password reset successful</h5>
        <p class="text-muted small mb-4">
          Your password has been set. You can now log in with your new password.
        </p>
        <a href="{% url 'login' %}" class="btn btn-success fw-semibold px-4">
          <i class="bi bi-box-arrow-in-right me-2"></i>Log In
        </a>
      </div>
    </div>

  </div>
</div>
{% endblock %}
